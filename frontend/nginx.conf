server {
    # 1. Listen on Port 80 with HTTP/2 Support
    # HTTP/2 multiplexes requests over a single TCP connection, eliminating head-of-line blocking.
    listen 80 http2;
    server_name localhost;

    # 2. Gzip Compression Configuration
    # Automatically compresses large text-based responses over the network, minimizing bandwidth.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # 3. Strict Security Headers
    # Prevents Clickjacking, MIME-sniffing, XSS, and enforces rigorous CSP for Zero-Knowledge security.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: Allow self, inline styles/scripts (Vite), data blobs (encryption), and local websockets.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss: http: https:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" always;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # 4. Reverse Proxy for Backend API
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CRITICAL: Never cache dynamic API responses (Zero-Knowledge rule)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }

    # 5. Reverse Proxy for WebSockets
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        
        # Required headers to natively upgrade an HTTP connection to a continuous WebSocket stream
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable Nginx buffering to allow real-time bidirectional streaming
        proxy_buffering off;
        proxy_read_timeout 86400; # Keep WS connection open for up to 24 hours
    }

    # 6. Static Asset Caching (JS, CSS, Images generated by Vite)
    location ~* \.(?:css|js|jpg|svg|png|gif|ico|woff2?|eot|ttf|otf)$ {
        try_files $uri =404;
        # Aggressively cache immutable assets for 1 year to ensure instant PWA loading
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 7. React Frontend SPA Routing Fallback
    location / {
        try_files $uri $uri/ /index.html;
        
        # Do not cache index.html so the browser always retrieves the latest PWA Service Worker manifest
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires off;
    }
}
