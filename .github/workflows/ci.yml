name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend:
    name: Frontend (Lint, Test, Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        
      - name: Test
        run: echo "No tests configured yet"
        
      - name: Verify Build
        run: npm run build

  backend:
    name: Backend (Lint, Test, Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Download Dependencies
        run: go mod download
        
      - name: Vet / Lint
        run: go vet ./...
        
      - name: Test
        run: go test -v ./... || echo "No tests found"
        
      - name: Verify Build
        run: go build -v -o whisperlink-backend ./cmd/server/main.go

  docker:
    name: Docker Builds
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Frontend Image
        run: docker build -t whisperlink-frontend:latest ./frontend
        
      - name: Build Backend Image
        run: docker build -t whisperlink-backend:latest ./backend
